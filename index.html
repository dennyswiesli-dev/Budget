<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lohnkalkulation – Finanz-Cockpit</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0E2A22">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=IBM+Plex+Mono:wght@400;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --ledger:#0E2A22; --ledger-2:#123A2E; --paper:#F6F4EC; --card:#FFFFFF;
  --ink:#1B241F; --muted:#6C7A6F; --rule:#DDD8C8; --rule-strong:#B9B29A;
  --plus:#2E7D5B; --minus:#B4452F; --warn:#C98A2D; --radius:14px;
  --shadow:0 1px 3px rgba(20,32,26,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Public Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  min-height:100dvh;font-size:15px;line-height:1.45}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font:inherit;color:inherit}
.num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.hidden{display:none!important}
h1,h2,h3{font-family:'Newsreader',serif;font-weight:700;line-height:1.15}
.pos{color:var(--plus)} .neg{color:var(--minus)}

#authView{min-height:100dvh;display:flex;align-items:center;justify-content:center;
  padding:28px 22px;background:linear-gradient(180deg,var(--ledger),var(--ledger-2));color:#F4F0E2}
.authCard{width:100%;max-width:380px}
.brandMark{width:76px;height:76px;border-radius:20px;margin:0 auto 14px;display:block}
.authCard h1{font-size:1.85rem;text-align:center;margin-bottom:2px}
.authCard .sub{text-align:center;color:#BBC9BE;margin-bottom:24px;font-size:.95rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:.78rem;margin-bottom:5px;color:#8FA396;
  text-transform:uppercase;letter-spacing:.06em}
#authView .field input{width:100%;padding:12px 14px;border-radius:10px;
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#F4F0E2;outline:none}
#authView .field input:focus{border-color:#8FB8A4}
.btn{display:block;width:100%;padding:13px;border-radius:10px;font-weight:600;text-align:center}
.btnPrimary{background:#F4F0E2;color:var(--ledger);margin-top:6px}
.btnGhost{border:1px solid rgba(255,255,255,.28);margin-top:10px;color:#F4F0E2}
.authLinks{display:flex;justify-content:space-between;margin-top:16px;font-size:.88rem}
.authLinks button{color:#BBC9BE;text-decoration:underline;text-underline-offset:3px}
.authErr{background:rgba(180,69,47,.25);border:1px solid rgba(230,140,120,.4);
  padding:10px 12px;border-radius:10px;font-size:.88rem;margin-bottom:12px}
.setupBox{background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.3);
  border-radius:12px;padding:16px;font-size:.9rem;line-height:1.55}
.setupBox code{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:#CFE3D6}

#appView{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
header.appHead{background:var(--ledger);color:#F4F0E2;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;position:sticky;top:0;z-index:30}
.headTop{display:flex;align-items:center;justify-content:space-between}
.headBrand{display:flex;align-items:center;gap:9px}
.headBrand img{width:28px;height:28px;border-radius:7px}
.headBrand span{font-family:'Newsreader',serif;font-weight:700;font-size:1.15rem}
.yearNav{display:flex;align-items:center;gap:4px}
.yearNav .y{font-family:'Newsreader',serif;font-weight:700;font-size:1.3rem;min-width:74px;text-align:center}
.yearNav button{width:34px;height:34px;border-radius:50%;color:#BBC9BE;font-size:1.05rem}
.iconBtn{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;font-size:1.1rem}

main{max-width:760px;margin:0 auto;padding:14px 12px 8px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;margin-bottom:14px;border:1px solid #ECE8DA;overflow-x:auto}
.card h3{font-size:1.12rem;margin-bottom:10px}
.cardHeadRow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.cardHeadRow h3{margin:0}
.miniBtn{padding:7px 13px;border-radius:9px;background:var(--ledger);color:#F4F0E2;
  font-size:.82rem;font-weight:600;white-space:nowrap}
.miniBtn.ghost{background:#EDEAE0;color:var(--ink)}
.miniBtn.danger{background:transparent;color:var(--minus)}
.hint{font-size:.82rem;color:var(--muted)}

/* Ledger-Tabellen */
table.ledger{width:100%;border-collapse:collapse;font-size:.88rem}
table.ledger th{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  text-align:right;padding:4px 6px;border-bottom:1px solid var(--rule-strong);font-weight:600}
table.ledger th:first-child, table.ledger td:first-child{text-align:left}
table.ledger td{padding:5px 6px;border-bottom:1px solid var(--rule);text-align:right;white-space:nowrap}
table.ledger td input{width:84px;padding:4px 6px;border:1px solid transparent;border-radius:6px;
  background:transparent;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:.88rem}
table.ledger td input.lab{width:130px;text-align:left;font-family:'Public Sans',sans-serif}
table.ledger td input:hover{border-color:var(--rule-strong)}
table.ledger td input:focus{border-color:var(--ledger);background:#fff;outline:none}
table.ledger tr.sumRow td{border-top:1px solid var(--rule-strong);border-bottom:none;
  font-weight:600;padding-top:7px}
.dblRule{border-bottom:3px double var(--ink)!important;display:inline-block;font-weight:600}
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:right;margin-top:10px}
.kb .cap{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.kb .val{font-size:1.02rem;font-weight:600;padding-top:2px}
.rowDel{color:var(--muted);font-size:.95rem;padding:2px 6px}
.rowDel:hover{color:var(--minus)}
.grpCap{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  font-weight:600;padding:10px 6px 4px;border-bottom:1px solid var(--rule-strong)}
.sectionCap{font-size:.75rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);
  font-weight:600;margin:18px 6px 8px}
.statLine{display:flex;justify-content:space-between;padding:7px 4px;border-bottom:1px solid var(--rule);font-size:.92rem}
.statLine:last-child{border:none}
.statLine b{font-weight:600}
.chartBox{position:relative;width:100%;max-height:260px;min-height:200px}

nav.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--rule);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;
  gap:2px;font-size:.66rem;color:var(--muted);font-weight:500}
nav.tabs button.on{color:var(--ledger)}
nav.tabs .ico{font-size:1.2rem;line-height:1}
.toast{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(96px + env(safe-area-inset-bottom));background:var(--ink);color:#F4F0E2;
  padding:10px 18px;border-radius:99px;font-size:.88rem;z-index:60}
.saveDot{width:8px;height:8px;border-radius:50%;background:#8FB8A4;display:inline-block;
  margin-left:6px;opacity:0;transition:opacity .3s}
.saveDot.on{opacity:1}
.pill{font-size:.72rem;background:#EDEAE0;border-radius:99px;padding:3px 9px;color:var(--muted)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div id="authView" class="hidden">
  <div class="authCard">
    <img src="icon-192.png" alt="Logo" class="brandMark">
    <h1>Lohnkalkulation</h1>
    <p class="sub">Dein Finanz-Cockpit – Monat, Vermögen, Fixkosten &amp; FIRE.</p>
    <div id="setupNotice" class="setupBox hidden">
      <strong>Einrichtung nötig:</strong> In <code>index.html</code> fehlt deine
      Firebase-Konfiguration (<code>FIREBASE_CONFIG</code>). Anleitung: <code>README.md</code>.
    </div>
    <div id="authForm">
      <div id="authErr" class="authErr hidden"></div>
      <div class="field"><label for="aEmail">E-Mail</label>
        <input id="aEmail" type="email" autocomplete="email"></div>
      <div class="field"><label for="aPass">Passwort</label>
        <input id="aPass" type="password" autocomplete="current-password"></div>
      <div class="field hidden" id="aPass2Wrap"><label for="aPass2">Passwort wiederholen</label>
        <input id="aPass2" type="password" autocomplete="new-password"></div>
      <button class="btn btnPrimary" id="authGo">Anmelden</button>
      <button class="btn btnGhost" id="googleGo">Mit Google anmelden</button>
      <div class="authLinks">
        <button id="toggleMode">Konto erstellen</button>
        <button id="resetPw">Passwort vergessen?</button>
      </div>
    </div>
  </div>
</div>

<div id="appView" class="hidden">
  <header class="appHead">
    <div class="headTop">
      <div class="headBrand"><img src="icon-192.png" alt=""><span>Lohnkalk</span><span class="saveDot" id="saveDot"></span></div>
      <div class="yearNav">
        <button id="yPrev" aria-label="Vorheriges Jahr">‹</button>
        <span class="y" id="yLabel">–</span>
        <button id="yNext" aria-label="Nächstes Jahr">›</button>
      </div>
      <button class="iconBtn" id="btnLogout" aria-label="Abmelden">⎋</button>
    </div>
  </header>
  <main>
    <section id="tabMonat"></section>
    <section id="tabKonten" class="hidden"></section>
    <section id="tabFix" class="hidden"></section>
    <section id="tabKK" class="hidden"></section>
    <section id="tabMehr" class="hidden"></section>
  </main>
  <nav class="tabs">
    <button data-tab="tabMonat" class="on"><span class="ico">📖</span>Monat</button>
    <button data-tab="tabKonten"><span class="ico">🏦</span>Konten</button>
    <button data-tab="tabFix"><span class="ico">📌</span>Fixkosten</button>
    <button data-tab="tabKK"><span class="ico">💳</span>Karten</button>
    <button data-tab="tabMehr"><span class="ico">⚙️</span>Mehr</button>
  </nav>
</div>
<script>
/* ============================================================
   FIREBASE-KONFIGURATION – HIER DEINE WERTE EINTRAGEN (README)
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyALUaQamasP5Ef6Twn_4NLPr82NAZqsCA0",
  authDomain: "mein-budget-db468.firebaseapp.com",
  projectId: "mein-budget-db468",
  storageBucket: "mein-budget-db468.firebasestorage.app",
  messagingSenderId: "549801738434",
  appId: "1:549801738434:web:b0142c48702485f8823b5b"
};
/* ============================================================ */
const $=id=>document.getElementById(id);
const configured=FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith("HIER_");
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const GROUP_NAMES=['Fixe Ausgaben','Sparen & Investieren','Rechnungen & Variables'];
let db=null,auth=null,uid=null;
let settings={currency:'CHF',lohnkontoZiel:4000,notgroschenZiel:30000,rules:[],fire:{items:[],entnahmerate:0.026,vermoegen:1900000}};
let years={};            // {'2026': {...}}
let year=String(new Date().getFullYear());
let dirty={};            // zu speichernde Docs
let chartNW=null, chartVergleich=null;

const fmt=n=>(n==null||isNaN(n))?'–':Number(n).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});
const chf=n=>fmt(n)+' Fr.';
const pAmt=s=>{const v=parseFloat(String(s).replace(/'/g,'').replace(/,/g,'.'));return isNaN(v)?0:Math.round(v*100)/100;};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
const emptyYear=()=>({calc:{current:{start:0,income:[],groups:[[],[],[]]},next:{start:0,income:[],groups:[[],[],[]]}},
  accounts:[],fixkosten:{items:[],transfer:0,base:0,monate:MONTHS.map(m=>({monat:m,ein:0,abgaenge:[]}))},
  ccCalc:{current:[],next:[],cashbackRate:0.003},ccOwn:[],ccShared:[],investments:[]});
function Y(){ if(!years[year]) years[year]=emptyYear(); return years[year]; }

/* ---------- Persistenz ---------- */
const col=()=>db.collection('users').doc(uid).collection('finance');
let saveTimer=null;
function save(docId){
  dirty[docId]=true; $('saveDot').classList.add('on');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    for(const id of Object.keys(dirty)){
      const data=id==='settings'?settings:years[id];
      if(data) await col().doc(id).set(JSON.parse(JSON.stringify(data)));
    }
    dirty={}; $('saveDot').classList.remove('on');
  },900);
}
async function loadAll(){
  const s=await col().get();
  years={};
  s.docs.forEach(d=>{ if(d.id==='settings') settings={...settings,...d.data()};
    else years[d.id]=d.data(); });
  const ys=Object.keys(years).sort();
  if(ys.length && !years[year]) year=ys[ys.length-1];
  renderYear();
}

/* ---------- Auth ---------- */
if(configured){
  firebase.initializeApp(FIREBASE_CONFIG);
  auth=firebase.auth(); db=firebase.firestore();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  auth.onAuthStateChanged(async u=>{
    if(u){ uid=u.uid; $('authView').classList.add('hidden');
      $('appView').classList.remove('hidden'); await loadAll(); }
    else { uid=null; $('appView').classList.add('hidden');
      $('authView').classList.remove('hidden'); }
  });
}else{
  $('authView').classList.remove('hidden');
  $('setupNotice').classList.remove('hidden'); $('authForm').classList.add('hidden');
}
let registerMode=false;
$('toggleMode').onclick=()=>{registerMode=!registerMode;
  $('aPass2Wrap').classList.toggle('hidden',!registerMode);
  $('authGo').textContent=registerMode?'Konto erstellen':'Anmelden';
  $('toggleMode').textContent=registerMode?'Ich habe schon ein Konto':'Konto erstellen';};
$('authGo').onclick=async()=>{
  const email=$('aEmail').value.trim(),pw=$('aPass').value;
  try{
    if(registerMode){
      if(pw!==$('aPass2').value) throw {message:'Die Passwörter stimmen nicht überein.'};
      await auth.createUserWithEmailAndPassword(email,pw);
    } else await auth.signInWithEmailAndPassword(email,pw);
  }catch(e){authErr(e);}
};
$('googleGo').onclick=async()=>{try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}
  catch(e){if(e.code!=='auth/popup-closed-by-user')authErr(e);}};
$('resetPw').onclick=async()=>{const em=$('aEmail').value.trim();
  if(!em)return authErr({message:'Bitte zuerst E-Mail eintragen.'});
  try{await auth.sendPasswordResetEmail(em);toast('Reset-E-Mail gesendet');}catch(e){authErr(e);}};
function authErr(e){const map={'auth/invalid-credential':'E-Mail oder Passwort ist falsch.',
  'auth/email-already-in-use':'Für diese E-Mail existiert bereits ein Konto.',
  'auth/invalid-email':'Die E-Mail-Adresse ist ungültig.'};
  $('authErr').textContent=map[e.code]||e.message||'Anmeldung fehlgeschlagen.';
  $('authErr').classList.remove('hidden');}
$('btnLogout').onclick=()=>auth.signOut();

/* ---------- Jahr & Tabs ---------- */
$('yPrev').onclick=()=>{year=String(+year-1);renderYear();};
$('yNext').onclick=()=>{year=String(+year+1);renderYear();};
let activeTab='tabMonat';
document.querySelectorAll('nav.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); activeTab=b.dataset.tab;
  ['tabMonat','tabKonten','tabFix','tabKK','tabMehr'].forEach(id=>
    $(id).classList.toggle('hidden',id!==activeTab));
  renderTab(); window.scrollTo(0,0);
});
function renderYear(){ $('yLabel').textContent=year; renderTab(); }
function renderTab(){
  if(activeTab==='tabMonat')renderMonat();
  else if(activeTab==='tabKonten')renderKonten();
  else if(activeTab==='tabFix')renderFix();
  else if(activeTab==='tabKK')renderKK();
  else renderMehr();
}

/* ---------- Editier-Helfer (data-path Binding) ---------- */
function getPath(root,path){return path.split('.').reduce((o,k)=>o?.[k],root);}
function setPath(root,path,val){const ks=path.split('.');const last=ks.pop();
  const o=ks.reduce((o,k)=>o[k],root); o[last]=val;}
function inp(path,val,opts={}){
  return '<input data-path="'+path+'" data-kind="'+(opts.kind||'num')+'" '+
    (opts.lab?'class="lab" ':'')+'value="'+(opts.lab?esc(val):(val??''))+'">';
}
document.addEventListener('change',e=>{
  const el=e.target; if(!el.dataset||!el.dataset.path) return;
  const kind=el.dataset.kind;
  const val=kind==='num'?pAmt(el.value):el.value;
  const scope=el.dataset.scope||'year';
  setPath(scope==='settings'?settings:Y(),el.dataset.path,val);
  save(scope==='settings'?'settings':year);
  renderTab();
});
document.addEventListener('click',e=>{
  const a=e.target.closest('[data-act]'); if(!a) return;
  handleAction(a.dataset); 
});
/* ================= MONAT ================= */
function calcSide(s){
  const inc=(s.income||[]).reduce((a,i)=>a+(i.value||0),0);
  const total=(s.start||0)+inc;
  const aus=(s.groups||[]).flat().reduce((a,i)=>a+(i.value||0),0);
  const rest=total-aus;
  return {inc,total,aus,rest,zuwachs:rest-(s.start||0),
    moegl:rest-(settings.lohnkontoZiel||4000)};
}
function sideCard(side,title){
  const s=Y().calc[side], c=calcSide(s);
  let h='<div class="card"><div class="cardHeadRow"><h3>'+title+'</h3>';
  if(side==='current') h+='<button class="miniBtn ghost" data-act="restNext">Rest → Folgemonat</button>';
  h+='</div><table class="ledger"><tbody>';
  h+='<tr><td>Startkapital Zahlungskonto</td><td>'+inp('calc.'+side+'.start',s.start)+'</td><td></td></tr>';
  (s.income||[]).forEach((i,ix)=>{
    h+='<tr><td>'+inp('calc.'+side+'.income.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
       '<td>'+inp('calc.'+side+'.income.'+ix+'.value',i.value)+'</td>'+
       '<td><button class="rowDel" data-act="del" data-p="calc.'+side+'.income" data-i="'+ix+'">✕</button></td></tr>';
  });
  h+='<tr><td colspan="3"><button class="miniBtn ghost" data-act="add" data-p="calc.'+side+'.income">＋ Lohn/Gutschrift</button></td></tr>';
  h+='<tr class="sumRow"><td>Total Kapital vorhanden</td><td class="num">'+fmt(c.total)+'</td><td></td></tr>';
  (s.groups||[]).forEach((g,gi)=>{
    h+='<tr><td colspan="3" class="grpCap" style="border:none;padding-top:12px">'+(GROUP_NAMES[gi]||'Weitere')+'</td></tr>';
    g.forEach((i,ix)=>{
      h+='<tr><td>'+inp('calc.'+side+'.groups.'+gi+'.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
         '<td>'+inp('calc.'+side+'.groups.'+gi+'.'+ix+'.value',i.value)+'</td>'+
         '<td><button class="rowDel" data-act="del" data-p="calc.'+side+'.groups.'+gi+'" data-i="'+ix+'">✕</button></td></tr>';
    });
    h+='<tr><td colspan="3"><button class="miniBtn ghost" data-act="add" data-p="calc.'+side+'.groups.'+gi+'">＋ Position</button></td></tr>';
  });
  h+='<tr class="sumRow"><td>Summe Ausgaben</td><td class="num">'+fmt(c.aus)+'</td><td></td></tr>';
  h+='</tbody></table>';
  h+='<div class="kb"><div><div class="cap">Restguthaben</div><div class="val num"><span class="dblRule '+(c.rest<0?'neg':'')+'">'+fmt(c.rest)+'</span></div></div>'+
     '<div><div class="cap">Zuwachs Kapital</div><div class="val num '+(c.zuwachs<0?'neg':'pos')+'">'+fmt(c.zuwachs)+'</div></div>'+
     '<div><div class="cap">Mögl. Sparen*</div><div class="val num '+(c.moegl<0?'neg':'pos')+'">'+fmt(c.moegl)+'</div></div></div>';
  h+='<p class="hint" style="margin-top:8px">*Restguthaben abzüglich Lohnkonto-Ziel von '+chf(settings.lohnkontoZiel||4000)+' (Regel 1)</p></div>';
  return h;
}
function renderMonat(){
  if(!years[year]){
    $('tabMonat').innerHTML='<div class="card"><h3>'+year+' ist noch leer</h3>'+
      '<p class="hint" style="margin:8px 0 12px">Lege das Jahr neu an oder übernimm Struktur und Endstände aus '+(+year-1)+'.</p>'+
      '<button class="miniBtn" data-act="newYear">Aus Vorjahr übernehmen</button> '+
      '<button class="miniBtn ghost" data-act="blankYear">Leer anlegen</button></div>';
    return;
  }
  $('tabMonat').innerHTML=sideCard('current','Aktueller Monat')+sideCard('next','Nächster Monat');
}

/* ================= KONTEN ================= */
function accountSaldi(a){
  let run=a.start||0; const saldi=[];
  (a.months||[]).forEach(m=>{run=Math.round((run+(m.plus||0)-(m.minus||0)+(m.adjust||0))*100)/100;saldi.push(run);});
  return saldi;
}
function renderKonten(){
  if(!years[year]){renderMonat();return;}
  const accs=Y().accounts||[];
  const nw=MONTHS.map((_,mi)=>accs.reduce((a,ac)=>a+accountSaldi(ac)[mi],0));
  let h='<div class="card"><h3>Total Nettowert</h3>'+
    '<div class="kb" style="margin:2px 0 10px"><div><div class="cap">Aktuell (Dez)</div>'+
    '<div class="val num"><span class="dblRule">'+fmt(nw[11]||0)+'</span></div></div>'+
    '<div><div class="cap">Zuwachs im Jahr</div><div class="val num pos">'+fmt((nw[11]||0)-accs.reduce((a,ac)=>a+(ac.start||0),0))+'</div></div>'+
    '<div><div class="cap">Konten</div><div class="val num">'+accs.length+'</div></div></div>'+
    '<div class="chartBox"><canvas id="cNW"></canvas></div></div>';
  accs.forEach((a,ai)=>{
    const saldi=accountSaldi(a);
    const plusSum=(a.months||[]).reduce((x,m)=>x+(m.plus||0),0);
    const minusSum=(a.months||[]).reduce((x,m)=>x+(m.minus||0),0);
    const hasProg=(a.months||[]).some(m=>m.prognose!=null);
    h+='<div class="card"><div class="cardHeadRow"><h3>'+inp('accounts.'+ai+'.name',a.name,{lab:1,kind:'text'})+'</h3>'+
      '<button class="miniBtn danger" data-act="delAcc" data-i="'+ai+'">Löschen</button></div>'+
      '<table class="ledger"><thead><tr><th>Monat</th>'+(hasProg?'<th>Prognose</th>':'')+
      '<th>＋</th><th>−</th><th>Saldo</th></tr></thead><tbody>';
    h+='<tr><td>Start</td>'+(hasProg?'<td></td>':'')+'<td></td><td></td><td>'+inp('accounts.'+ai+'.start',a.start)+'</td></tr>';
    MONTHS.forEach((M,mi)=>{
      const m=a.months[mi]||{};
      h+='<tr><td>'+M+'</td>'+
        (hasProg?'<td>'+inp('accounts.'+ai+'.months.'+mi+'.prognose',m.prognose??'')+'</td>':'')+
        '<td>'+inp('accounts.'+ai+'.months.'+mi+'.plus',m.plus||'')+'</td>'+
        '<td>'+inp('accounts.'+ai+'.months.'+mi+'.minus',m.minus||'')+'</td>'+
        '<td class="num">'+fmt(saldi[mi])+(m.adjust?' <span class="pill" title="Korrektur/Kurseffekt">Δ '+fmt(m.adjust)+'</span>':'')+'</td></tr>';
    });
    h+='<tr class="sumRow"><td>＋ Ende Jahr</td>'+(hasProg?'<td></td>':'')+
      '<td class="num pos">'+fmt(plusSum)+'</td><td class="num neg">'+fmt(minusSum)+'</td>'+
      '<td class="num"><span class="dblRule">'+fmt(saldi[11]||a.start)+'</span></td></tr>';
    h+='</tbody></table></div>';
  });
  h+='<button class="miniBtn" data-act="addAcc" style="margin-bottom:16px">＋ Konto hinzufügen</button>';
  $('tabKonten').innerHTML=h;
  if(chartNW)chartNW.destroy();
  chartNW=new Chart($('cNW'),{type:'line',data:{labels:MONTHS.map(m=>m.slice(0,3)),
    datasets:[{label:'Nettowert',data:nw,borderColor:'#0E2A22',backgroundColor:'rgba(46,125,91,.12)',fill:true,tension:.25}]},
    options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>Math.round(v/1000)+"k"}}}}});
}

/* ================= FIXKOSTEN ================= */
const abgOf=m=>m.abg!=null?m.abg:(m.abgaenge||[]).reduce((a,x)=>a+x,0);
function renderFix(){
  if(!years[year]){renderMonat();return;}
  const fk=Y().fixkosten;
  const sum=(fk.items||[]).reduce((a,i)=>a+(i.value||0),0);
  let h='<div class="card"><div class="cardHeadRow"><h3>Jährliche Ausgaben</h3>'+
    '<button class="miniBtn ghost" data-act="add" data-p="fixkosten.items">＋ Position</button></div>'+
    '<table class="ledger"><tbody>';
  (fk.items||[]).forEach((i,ix)=>{
    h+='<tr><td>'+inp('fixkosten.items.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
      '<td>'+inp('fixkosten.items.'+ix+'.value',i.value)+'</td>'+
      '<td><button class="rowDel" data-act="del" data-p="fixkosten.items" data-i="'+ix+'">✕</button></td></tr>';});
  h+='<tr class="sumRow"><td>Total pro Jahr</td><td class="num"><span class="dblRule">'+fmt(sum)+'</span></td><td></td></tr>';
  h+='</tbody></table>'+
    '<div class="statLine"><span>Empfohlener Übertrag/Monat (Total ÷ 12)</span><b class="num">'+fmt(sum/12)+'</b></div>'+
    '<div class="statLine"><span>Gewählter Übertrag/Monat</span><b>'+inp('fixkosten.transfer',fk.transfer)+'</b></div></div>';
  // Steuer-/Fixkostenkonto Verlauf
  let run=fk.base||0, einSum=0, abgSum=0;
  h+='<div class="card"><h3>Fixkosten-Konto im Jahresverlauf</h3>'+
    '<div class="statLine"><span>Basis Anfang Jahr</span><b>'+inp('fixkosten.base',fk.base)+'</b></div>'+
    '<table class="ledger"><thead><tr><th>Monat</th><th>Einzahlung</th><th>Abgänge</th><th>Saldo</th></tr></thead><tbody>';
  (fk.monate||[]).forEach((m,mi)=>{
    const abg=abgOf(m); einSum+=m.ein||0; abgSum+=abg;
    run=Math.round((run+(m.ein||0)-abg)*100)/100;
    h+='<tr><td>'+m.monat+'</td><td>'+inp('fixkosten.monate.'+mi+'.ein',m.ein||'')+'</td>'+
      '<td>'+inp('fixkosten.monate.'+mi+'.abg',abg||'')+'</td>'+
      '<td class="num '+(run<0?'neg':'')+'">'+fmt(run)+'</td></tr>';});
  h+='<tr class="sumRow"><td>Total</td><td class="num pos">'+fmt(einSum)+'</td>'+
    '<td class="num neg">'+fmt(abgSum)+'</td><td class="num"><span class="dblRule">'+fmt(run)+'</span></td></tr>';
  h+='</tbody></table>'+
    '<div class="statLine"><span>Überschuss budgetiert (Einzahlungen − Jahresausgaben)</span><b class="num '+(einSum-sum<0?'neg':'pos')+'">'+fmt(einSum-sum)+'</b></div>'+
    '<div class="statLine"><span>Überschuss effektiv (Endsaldo − Basis)</span><b class="num '+(run-(fk.base||0)<0?'neg':'pos')+'">'+fmt(run-(fk.base||0))+'</b></div></div>';
  $('tabFix').innerHTML=h;
}

/* ================= KREDITKARTEN ================= */
const ccTot=e=>e.amount!=null?e.amount:(e.amounts||[]).reduce((a,x)=>a+x,0);
function renderKK(){
  if(!years[year]){renderMonat();return;}
  const yy=Y();
  const cc=yy.ccCalc||{current:[],next:[],cashbackRate:0.003};
  let h='';
  // Kalkulation nächster Monat
  [['current','Kalkulation aktueller Monat'],['next','Kalkulation nächster Monat']].forEach(([side,title])=>{
    const tot=(cc[side]||[]).reduce((a,i)=>a+(i.value||0),0);
    h+='<div class="card"><div class="cardHeadRow"><h3>'+title+'</h3>'+
      '<button class="miniBtn ghost" data-act="add" data-p="ccCalc.'+side+'">＋ Posten</button></div>'+
      '<table class="ledger"><tbody>';
    (cc[side]||[]).forEach((i,ix)=>{
      h+='<tr><td>'+inp('ccCalc.'+side+'.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
        '<td>'+inp('ccCalc.'+side+'.'+ix+'.value',i.value)+'</td>'+
        '<td><button class="rowDel" data-act="del" data-p="ccCalc.'+side+'" data-i="'+ix+'">✕</button></td></tr>';});
    h+='<tr class="sumRow"><td>Total</td><td class="num"><span class="dblRule">'+fmt(tot)+'</span></td><td></td></tr></tbody></table>'+
      '<div class="statLine"><span>Cashback ('+((cc.cashbackRate||0.003)*100).toFixed(1)+'%)</span><b class="num pos">'+fmt(tot*(cc.cashbackRate||0.003))+'</b></div></div>';
  });
  // Monatswerte + Durchschnitt
  [['ccOwn','Eigene Karte – Monatswerte',false],['ccShared','Gemeinsame Karte – Monatswerte',true]].forEach(([key,title,shared])=>{
    const rows=yy[key]||[];
    while(rows.length<12) rows.push({amounts:[]});
    const totals=rows.map(ccTot);
    const ferien=rows.map(r=>r.ferien||0);
    const n=totals.filter((t,i)=>t>0||ferien[i]>0).length||1;
    const avg=totals.reduce((a,x)=>a+x,0)/n;
    const avgNormal=(totals.reduce((a,x)=>a+x,0)-ferien.reduce((a,x)=>a+x,0))/n;
    h+='<div class="card"><h3>'+title+'</h3><table class="ledger"><thead><tr><th>Monat</th><th>Total</th>'+
      (shared?'<th>davon Ferien/Einmalig</th>':'')+'</tr></thead><tbody>';
    MONTHS.forEach((M,mi)=>{
      h+='<tr><td>'+M+'</td><td>'+inp(key+'.'+mi+'.amount',totals[mi]||'')+'</td>'+
        (shared?'<td>'+inp(key+'.'+mi+'.ferien',ferien[mi]||'')+'</td>':'')+'</tr>';});
    h+='</tbody></table>'+
      '<div class="statLine"><span>Ø pro Monat ('+n+' Monate)</span><b class="num">'+fmt(avg)+'</b></div>'+
      (shared?'<div class="statLine"><span>Ø „Normal" (ohne Ferien)</span><b class="num">'+fmt(avgNormal)+'</b></div>'+
        '<div class="statLine"><span>Eigener Anteil (½)</span><b class="num"><span class="dblRule">'+fmt(avgNormal/2)+'</span></b></div>':'')+
      '</div>';
  });
  h+='<p class="hint" style="margin:0 6px 16px">Die Ø-Werte kannst du als Prognose für „Kreditkarte" im Folgemonat verwenden.</p>';
  $('tabKK').innerHTML=h;
}

/* ================= MEHR ================= */
function renderMehr(){
  const yy=years[year]||emptyYear();
  const fire=settings.fire||{items:[],entnahmerate:0.026};
  const fSum=(fire.items||[]).reduce((a,i)=>a+(i.value||0),0);
  const noetig=fire.entnahmerate?fSum/fire.entnahmerate:0;
  let h='<p class="sectionCap">Investitionen '+year+'</p><div class="card">'+
    '<table class="ledger"><tbody>';
  (yy.investments||[]).forEach((i,ix)=>{
    h+='<tr><td>'+inp('investments.'+ix+'.date',i.date,{lab:1,kind:'text'})+'</td>'+
      '<td>'+inp('investments.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
      '<td>'+inp('investments.'+ix+'.amount',i.amount)+'</td>'+
      '<td><button class="rowDel" data-act="del" data-p="investments" data-i="'+ix+'">✕</button></td></tr>';});
  h+='<tr class="sumRow"><td colspan="2">Total</td><td class="num">'+
    fmt((yy.investments||[]).reduce((a,i)=>a+(i.amount||0),0))+'</td><td></td></tr></tbody></table>'+
    '<button class="miniBtn ghost" data-act="addInv" style="margin-top:8px">＋ Investition</button></div>';
  h+='<p class="sectionCap">FIRE-Berechnung</p><div class="card"><table class="ledger"><tbody>';
  (fire.items||[]).forEach((i,ix)=>{
    h+='<tr><td><input data-scope="settings" data-path="fire.items.'+ix+'.label" data-kind="text" class="lab" value="'+esc(i.label)+'"></td>'+
      '<td><input data-scope="settings" data-path="fire.items.'+ix+'.value" data-kind="num" value="'+i.value+'"></td>'+
      '<td><button class="rowDel" data-act="delFire" data-i="'+ix+'">✕</button></td></tr>';});
  h+='<tr class="sumRow"><td>Kosten pro Jahr</td><td class="num">'+fmt(fSum)+'</td><td></td></tr></tbody></table>'+
    '<button class="miniBtn ghost" data-act="addFire" style="margin:8px 0 4px">＋ Position</button>'+
    '<div class="statLine"><span>Kosten pro Monat</span><b class="num">'+fmt(fSum/12)+'</b></div>'+
    '<div class="statLine"><span>Entnahmerate</span><b><input data-scope="settings" data-path="fire.entnahmerate" data-kind="num" value="'+(fire.entnahmerate||0.026)+'" style="width:70px;text-align:right;border:1px solid var(--rule-strong);border-radius:6px;padding:3px 6px"></b></div>'+
    '<div class="statLine"><span>Benötigtes Vermögen</span><b class="num"><span class="dblRule">'+fmt(noetig)+'</span></b></div>'+
    '<div class="statLine"><span>Ziel-Vermögen</span><b><input data-scope="settings" data-path="fire.vermoegen" data-kind="num" value="'+(fire.vermoegen||0)+'" style="width:110px;text-align:right;border:1px solid var(--rule-strong);border-radius:6px;padding:3px 6px"></b></div></div>';
  h+='<p class="sectionCap">Meine Finanzregeln</p><div class="card">';
  (settings.rules||[]).forEach((r,ix)=>{
    h+='<div class="statLine"><span style="flex:1"><b>'+esc(r.nr||(ix+1)+'.')+'</b> '+
      '<input data-scope="settings" data-path="rules.'+ix+'.text" data-kind="text" value="'+esc(r.text)+'" style="width:100%;border:none;background:transparent"></span>'+
      (r.value?'<b class="num" style="margin-left:8px">'+fmt(r.value)+'</b>':'')+
      '<button class="rowDel" data-act="delRule" data-i="'+ix+'">✕</button></div>';});
  h+='<button class="miniBtn ghost" data-act="addRule" style="margin-top:8px">＋ Regel</button></div>';
  h+='<p class="sectionCap">Jahresvergleich</p><div class="card"><div class="chartBox"><canvas id="cVergleich"></canvas></div></div>';
  h+='<p class="sectionCap">Daten</p><div class="card">'+
    '<div class="statLine"><span>Excel-Daten importieren<br><span class="hint">seed.json vom Gerät auswählen – nicht ins Repo hochladen!</span></span><button class="miniBtn" data-act="importSeed">Importieren</button></div>'+
    '<input type="file" id="seedFile" accept=".json,application/json" class="hidden">'+
    '<div class="statLine"><span>Backup als JSON herunterladen</span><button class="miniBtn ghost" data-act="exportJson">Export</button></div>'+
    '<div class="statLine"><span id="mailLine"></span><button class="miniBtn ghost" data-act="logout">Abmelden</button></div></div>';
  $('tabMehr').innerHTML=h;
  if(auth?.currentUser) $('mailLine').textContent=auth.currentUser.email||'Google-Konto';
  const ys=Object.keys(years).sort();
  const ends=ys.map(y=>{const a=(years[y].accounts||[]);
    return a.reduce((t,ac)=>{let r=ac.start||0;(ac.months||[]).forEach(m=>r+=(m.plus||0)-(m.minus||0)+(m.adjust||0));return t+r;},0);});
  if(chartVergleich)chartVergleich.destroy();
  chartVergleich=new Chart($('cVergleich'),{type:'bar',data:{labels:ys,
    datasets:[{label:'Nettowert Ende Jahr',data:ends,backgroundColor:'#2E7D5B',borderRadius:5}]},
    options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>Math.round(v/1000)+"k"}}}}});
}

/* ================= AKTIONEN ================= */
async function handleAction(d){
  const yy=Y();
  switch(d.act){
    case 'add': getPath(yy,d.p).push({label:'Neu',value:0}); break;
    case 'del': getPath(yy,d.p).splice(+d.i,1); break;
    case 'restNext': yy.calc.next.start=calcSide(yy.calc.current).rest;
      toast('Restguthaben als Startkapital des Folgemonats übernommen'); break;
    case 'addAcc': yy.accounts.push({name:'Neues Konto',start:0,
      months:MONTHS.map(()=>({plus:0,minus:0})),extra:[]}); break;
    case 'delAcc': if(confirm('Konto wirklich löschen?')) yy.accounts.splice(+d.i,1); else return; break;
    case 'addInv': (yy.investments=yy.investments||[]).push({date:new Date().toISOString().slice(0,10),label:'Neu',amount:0}); break;
    case 'addFire': settings.fire.items.push({label:'Neu',value:0}); save('settings'); renderTab(); return;
    case 'delFire': settings.fire.items.splice(+d.i,1); save('settings'); renderTab(); return;
    case 'addRule': (settings.rules=settings.rules||[]).push({nr:(settings.rules.length+1)+'.',text:''}); save('settings'); renderTab(); return;
    case 'delRule': settings.rules.splice(+d.i,1); save('settings'); renderTab(); return;
    case 'newYear': {
      const prev=years[String(+year-1)];
      const ny=prev?JSON.parse(JSON.stringify(prev)):emptyYear();
      if(prev){
        ny.accounts.forEach(a=>{a.start=accountSaldi(a)[11]??a.start;
          a.months=MONTHS.map(()=>({plus:0,minus:0}));});
        ny.fixkosten.base=0; ny.fixkosten.monate=MONTHS.map((m,i)=>({monat:m,ein:prev.fixkosten?.transfer||0,abg:0}));
        ny.investments=[]; ny.ccOwn=[]; ny.ccShared=[];
        ny.calc.current.start=calcSide(prev.calc.next).rest;
      }
      years[year]=ny; break; }
    case 'blankYear': years[year]=emptyYear(); break;
    case 'importSeed': document.getElementById('seedFile').click(); return;
    case 'exportJson': {
      const blob=new Blob([JSON.stringify({settings,years},null,1)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='lohnkalkulation-backup.json';a.click(); return; }
    case 'logout': auth.signOut(); return;
    default: return;
  }
  save(year); renderTab();
}
document.addEventListener('change',async e=>{
  if(e.target.id!=='seedFile'||!e.target.files[0]) return;
  try{
    const seed=JSON.parse(await e.target.files[0].text());
    settings={...settings,...seed.settings};
    for(const [yr,data] of Object.entries(seed.years||{})){
      (data.fixkosten?.monate||[]).forEach(m=>{m.abg=(m.abgaenge||[]).reduce((a,x)=>a+x,0);delete m.abgaenge;});
      years[yr]=data; dirty[yr]=true;
    }
    save('settings');
    toast('Alle Jahre importiert – wird gespeichert …');
    renderTab();
  }catch(err){ toast('Import fehlgeschlagen: keine gültige seed.json'); }
  e.target.value='';
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
