<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lohnkalkulation – Finanz-Cockpit</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4F46E5">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#F3F4F9; --bg-2:#EAEBF7; --card:#FFFFFF;
  --ink:#1A1B2E; --muted:#8B8FA8; --rule:#EDEEF6; --rule-strong:#DBDDEF;
  --primary:#5B5FEF; --primary-2:#8B5CF6; --primary-ink:#3F3FBF; --primary-soft:#EEEEFD;
  --plus:#16A34A; --plus-soft:#E9F9EF; --minus:#E11D48; --minus-soft:#FDECEF;
  --warn:#F59E0B; --warn-soft:#FEF3E2; --radius:20px; --radius-sm:12px;
  --shadow:0 1px 2px rgba(26,27,46,.04), 0 8px 24px -12px rgba(26,27,46,.12);
  --shadow-sm:0 1px 2px rgba(26,27,46,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100dvh;font-size:15px;line-height:1.45;
  background-image:radial-gradient(circle at 100% 0%,rgba(91,95,239,.07),transparent 55%);
  background-attachment:fixed}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font:inherit;color:inherit}
.num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.hidden{display:none!important}
h1,h2,h3{font-family:'Sora',sans-serif;font-weight:700;line-height:1.2;letter-spacing:-.01em}
.pos{color:var(--plus)} .neg{color:var(--minus)}

#authView{min-height:100dvh;display:flex;align-items:center;justify-content:center;
  padding:28px 22px;background:radial-gradient(circle at 15% 8%,#7C6EF0,#5B5FEF 45%,#3F3FBF 100%);color:#F1F1FE}
.authCard{width:100%;max-width:380px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  border-radius:24px;padding:30px 26px;backdrop-filter:blur(18px);box-shadow:0 20px 50px -20px rgba(20,10,60,.5)}
.brandMark{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;display:block;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.authCard h1{font-size:1.7rem;text-align:center;margin-bottom:2px}
.authCard .sub{text-align:center;color:#D6D5FB;margin-bottom:24px;font-size:.92rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:.76rem;margin-bottom:5px;color:#C9C8F7;
  text-transform:uppercase;letter-spacing:.06em}
#authView .field input{width:100%;padding:12px 14px;border-radius:12px;
  border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.09);color:#fff;outline:none;transition:border-color .15s,background .15s}
#authView .field input:focus{border-color:#fff;background:rgba(255,255,255,.15)}
.btn{display:block;width:100%;padding:13px;border-radius:12px;font-weight:600;text-align:center;transition:transform .15s,opacity .15s}
.btn:active{transform:scale(.98)}
.btnPrimary{background:#fff;color:var(--primary-ink);margin-top:6px;box-shadow:0 6px 16px -4px rgba(0,0,0,.3)}
.btnGhost{border:1px solid rgba(255,255,255,.3);margin-top:10px;color:#fff}
.authLinks{display:flex;justify-content:space-between;margin-top:16px;font-size:.86rem}
.authLinks button{color:#D6D5FB;text-decoration:underline;text-underline-offset:3px}
.authErr{background:rgba(225,29,72,.25);border:1px solid rgba(255,140,160,.4);
  padding:10px 12px;border-radius:12px;font-size:.88rem;margin-bottom:12px}
.setupBox{background:rgba(255,255,255,.07);border:1px dashed rgba(255,255,255,.3);
  border-radius:14px;padding:16px;font-size:.9rem;line-height:1.55}
.setupBox code{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:#E4E3FE}

#appView{padding-bottom:calc(78px + env(safe-area-inset-bottom))}
header.appHead{background:linear-gradient(120deg,#5B5FEF,#8B5CF6);color:#fff;
  padding:calc(10px + env(safe-area-inset-top)) 16px 12px;position:sticky;top:0;z-index:30;
  box-shadow:0 4px 20px -8px rgba(91,95,239,.5)}
.headTop{display:flex;align-items:center;justify-content:space-between}
.headBrand{display:flex;align-items:center;gap:9px}
.headBrand img{width:30px;height:30px;border-radius:9px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.headBrand span{font-family:'Sora',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-.01em}
.yearNav{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.14);border-radius:99px;padding:3px}
.yearNav .y{font-family:'Sora',sans-serif;font-weight:700;font-size:1.05rem;min-width:60px;text-align:center}
.yearNav button{width:30px;height:30px;border-radius:50%;color:#fff;font-size:1.05rem;opacity:.85}
.yearNav button:hover{background:rgba(255,255,255,.18);opacity:1}
.iconBtn{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:1.05rem;
  background:rgba(255,255,255,.14);color:#fff}
.iconBtn:hover{background:rgba(255,255,255,.24)}

main{max-width:760px;margin:0 auto;padding:16px 12px 8px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px 14px;margin-bottom:14px;border:1px solid var(--rule);overflow-x:auto}
.card h3{font-size:1.05rem;margin-bottom:10px;color:var(--ink)}
.cardHeadRow{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.cardHeadRow h3{margin:0}
.miniBtn{padding:8px 14px;border-radius:99px;background:var(--primary);color:#fff;
  font-size:.82rem;font-weight:600;white-space:nowrap;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 8px -2px rgba(91,95,239,.5)}
.miniBtn:hover{transform:translateY(-1px)}
.miniBtn:active{transform:translateY(0)}
.miniBtn.ghost{background:var(--primary-soft);color:var(--primary-ink);box-shadow:none}
.miniBtn.danger{background:var(--minus-soft);color:var(--minus);box-shadow:none}
.hint{font-size:.82rem;color:var(--muted)}

/* Tabellen */
table.ledger{width:100%;max-width:100%;border-collapse:collapse;font-size:.87rem}
table.ledger th{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);
  text-align:right;padding:6px;border-bottom:1px solid var(--rule-strong);font-weight:600;white-space:normal}
table.ledger th:first-child, table.ledger td:first-child{text-align:left}
table.ledger td{padding:7px 6px;border-bottom:1px solid var(--rule);text-align:right;white-space:nowrap}
table.ledger tbody tr:hover{background:var(--bg)}
table.ledger td:first-child{white-space:normal;overflow-wrap:anywhere;text-align:left}
table.ledger td input{width:82px;max-width:100%;padding:6px 7px;border:1px solid transparent;border-radius:8px;
  background:transparent;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.87rem;transition:border-color .12s,background .12s}
table.ledger td.labCol{width:99%;text-align:left;white-space:normal}
.labEdit{min-width:0;width:100%;text-align:left;font-family:'Inter',sans-serif;
  white-space:normal;overflow-wrap:anywhere;padding:5px 7px;border-radius:8px;
  border:1px solid transparent;line-height:1.3;transition:border-color .12s,background .12s}
.labEdit:hover{border-color:var(--rule-strong);background:var(--bg)}
.labEdit:focus{border-color:var(--primary);background:#fff;outline:none;box-shadow:0 0 0 3px var(--primary-soft)}
table.ledger td input:hover{border-color:var(--rule-strong);background:var(--bg)}
table.ledger td input:focus{border-color:var(--primary);background:#fff;outline:none;box-shadow:0 0 0 3px var(--primary-soft)}
table.ledger tr.sumRow td{border-top:2px solid var(--rule-strong);border-bottom:none;
  font-weight:700;padding-top:9px;color:var(--ink)}
.dblRule{border-bottom:2px solid var(--primary);display:inline-block;font-weight:700;padding-bottom:1px}
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:right;margin-top:12px}
.kb .cap{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.kb .val{font-size:1.05rem;font-weight:700;padding-top:3px;font-family:'Sora',sans-serif}
.rowDel{color:var(--muted);font-size:.95rem;padding:3px 7px;border-radius:8px}
.rowDel:hover{color:var(--minus);background:var(--minus-soft)}
.grpCap{padding:14px 4px 6px;border-bottom:1px solid var(--rule-strong)}
.grpCap .labEdit{font-size:.7rem;text-transform:uppercase;letter-spacing:.07em;color:var(--primary-ink);
  font-weight:700;padding:2px 4px;min-width:0}
.grpCap .labEdit:focus{color:var(--ink)}
.sectionCap{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
  font-weight:700;margin:20px 6px 8px}
.statLine{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 4px;border-bottom:1px solid var(--rule);font-size:.9rem}
.statLine>span:first-child{flex:1;min-width:150px}
.statLine:last-child{border:none}
.statLine b{font-weight:600}
.chartBox{position:relative;width:100%;max-height:260px;min-height:200px}

nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--rule-strong);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;padding:9px 0 6px;display:flex;flex-direction:column;align-items:center;
  gap:3px;font-size:.6rem;color:var(--muted);font-weight:600;min-width:0;transition:color .15s}
nav.tabs button.on{color:var(--primary)}
nav.tabs .ico{font-size:1.2rem;line-height:1;transition:transform .15s}
nav.tabs button.on .ico{transform:translateY(-2px)}
.toast{position:fixed;left:50%;transform:translateX(-50%);
  bottom:calc(96px + env(safe-area-inset-bottom));background:var(--ink);color:#fff;
  padding:11px 20px;border-radius:99px;font-size:.86rem;z-index:60;box-shadow:0 8px 24px -8px rgba(0,0,0,.4)}
.saveDot{width:8px;height:8px;border-radius:50%;background:#4ADE80;display:inline-block;
  margin-left:6px;opacity:0;transition:opacity .3s;box-shadow:0 0 0 3px rgba(74,222,128,.25)}
.saveDot.on{opacity:1}
.pill{font-size:.7rem;background:var(--primary-soft);border-radius:99px;padding:3px 10px;color:var(--primary-ink);font-weight:600}
h3 input.titleInp{font-family:'Sora',sans-serif;font-weight:700;font-size:1.05rem;
  border:none;background:transparent;width:100%;padding:2px 0}
h3 input.titleInp:focus{outline:none;border-bottom:2px solid var(--primary)}
.cardHeadRow h3{flex:1;min-width:0}
.dateCol{text-align:left;white-space:nowrap;width:1%}
.dateCol .labEdit{min-width:92px;white-space:nowrap;overflow-wrap:normal}
.cardNow{border-top:3px solid var(--plus);position:relative}
.cardNext{border-top:3px solid var(--warn);position:relative}
.tag{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  border-radius:99px;padding:4px 10px;vertical-align:middle;margin-left:8px}
.tagNow{background:var(--plus-soft);color:var(--plus)}
.tagNext{background:var(--warn-soft);color:var(--warn)}
.scrollX{overflow-x:auto;margin:0 -12px;padding:0 12px}
.scrollX table.ledger td:first-child, .scrollX table.ledger th:first-child{
  position:sticky;left:0;background:var(--card);z-index:2}
.bar{height:8px;border-radius:99px;background:var(--bg-2);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--plus),#22C55E);transition:width .4s}
.bar.warn>i{background:linear-gradient(90deg,var(--warn),#FBBF24)} .bar.over>i{background:linear-gradient(90deg,var(--minus),#F43F5E)}
.dashGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dashCell{background:var(--card);border:1px solid var(--rule);border-radius:var(--radius-sm);
  box-shadow:var(--shadow-sm);padding:13px}
.dashCell .cap{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.dashCell .val{font-size:1.2rem;font-weight:700;margin-top:4px;font-family:'Sora',sans-serif}
details summary{list-style:none;cursor:pointer}
details summary::-webkit-details-marker{display:none}
@media(max-width:430px){
  table.ledger{font-size:.82rem}
  table.ledger td{padding:5px 3px}
  table.ledger td input{width:70px;font-size:.82rem}
  table.ledger th{font-size:.6rem;padding:5px 3px}
  .kb .val{font-size:.94rem}
  main{padding:12px 8px 8px}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0F1020; --bg-2:#181A33; --card:#171933;
    --ink:#EDEEFB; --muted:#9295BD; --rule:#242645; --rule-strong:#33366099;
    --primary-soft:#26244F; --plus-soft:#0F2A1D; --minus-soft:#301521; --warn-soft:#2E2410;
  }
  body{background-image:radial-gradient(circle at 100% 0%,rgba(91,95,239,.14),transparent 55%)}
  nav.tabs{background:rgba(23,25,51,.9)}
  table.ledger tbody tr:hover{background:var(--bg-2)}
  .labEdit:hover, table.ledger td input:hover{background:var(--bg-2)}
  .labEdit:focus, table.ledger td input:focus{background:#1E2044}
}
</style>
</head>
<body>

<div id="authView" class="hidden">
  <div class="authCard">
    <img src="icon-192.png" alt="Logo" class="brandMark">
    <h1>Lohnkalkulation</h1>
    <p class="sub">Dein Finanz-Cockpit – Monat, Vermögen, Fixkosten &amp; FIRE.</p>
    <div id="setupNotice" class="setupBox hidden">
      <strong>Einrichtung nötig:</strong> In <code>index.html</code> fehlt deine
      Firebase-Konfiguration (<code>FIREBASE_CONFIG</code>). Anleitung: <code>README.md</code>.
    </div>
    <div id="authForm">
      <div id="authErr" class="authErr hidden"></div>
      <div class="field"><label for="aEmail">E-Mail</label>
        <input id="aEmail" type="email" autocomplete="email"></div>
      <div class="field"><label for="aPass">Passwort</label>
        <input id="aPass" type="password" autocomplete="current-password"></div>
      <div class="field hidden" id="aPass2Wrap"><label for="aPass2">Passwort wiederholen</label>
        <input id="aPass2" type="password" autocomplete="new-password"></div>
      <button class="btn btnPrimary" id="authGo">Anmelden</button>
      <button class="btn btnGhost" id="googleGo">Mit Google anmelden</button>
      <div class="authLinks">
        <button id="toggleMode">Konto erstellen</button>
        <button id="resetPw">Passwort vergessen?</button>
      </div>
    </div>
  </div>
</div>

<div id="appView" class="hidden">
  <header class="appHead">
    <div class="headTop">
      <div class="headBrand"><img src="icon-192.png" alt=""><span>Lohnkalk</span><span class="saveDot" id="saveDot"></span></div>
      <div class="yearNav">
        <button id="yPrev" aria-label="Vorheriges Jahr">‹</button>
        <span class="y" id="yLabel">–</span>
        <button id="yNext" aria-label="Nächstes Jahr">›</button>
      </div>
      <button class="iconBtn" id="btnLogout" aria-label="Abmelden">⎋</button>
    </div>
  </header>
  <main>
    <section id="tabDash"></section>
    <section id="tabMonat" class="hidden"></section>
    <section id="tabKonten" class="hidden"></section>
    <section id="tabFix" class="hidden"></section>
    <section id="tabKK" class="hidden"></section>
    <section id="tabLohn" class="hidden"></section>
    <section id="tabMehr" class="hidden"></section>
  </main>
  <nav class="tabs">
    <button data-tab="tabDash" class="on"><span class="ico">🏠</span>Übersicht</button>
    <button data-tab="tabMonat"><span class="ico">📖</span>Monat</button>
    <button data-tab="tabKonten"><span class="ico">🏦</span>Konten</button>
    <button data-tab="tabFix"><span class="ico">📌</span>Fixkosten</button>
    <button data-tab="tabKK"><span class="ico">💳</span>Karten</button>
    <button data-tab="tabLohn"><span class="ico">💰</span>Lohn</button>
    <button data-tab="tabMehr"><span class="ico">⚙️</span>Mehr</button>
  </nav>
</div>
<script>
/* ============================================================
   FIREBASE-KONFIGURATION – HIER DEINE WERTE EINTRAGEN (README)
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyALUaQamasP5Ef6Twn_4NLPr82NAZqsCA0",
  authDomain: "mein-budget-db468.firebaseapp.com",
  projectId: "mein-budget-db468",
  storageBucket: "mein-budget-db468.firebasestorage.app",
  messagingSenderId: "549801738434",
  appId: "1:549801738434:web:b0142c48702485f8823b5b"
};
/* ============================================================ */
const $=id=>document.getElementById(id);
const configured=FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith("HIER_");
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const GROUP_NAMES=['Fixe Ausgaben','Sparen & Investieren','Rechnungen & Variables'];
let db=null,auth=null,uid=null;
let settings={currency:'CHF',lohnkontoZiel:4000,notgroschenZiel:30000,rules:[],fire:{items:[],entnahmerate:0.026,vermoegen:1900000}};
let years={};            // {'2026': {...}}
let year=String(new Date().getFullYear());
let dirty={};            // zu speichernde Docs
let chartNW=null, chartVergleich=null;

const fmt=n=>(n==null||isNaN(n))?'–':Number(n).toLocaleString('de-CH',{minimumFractionDigits:2,maximumFractionDigits:2});
const chf=n=>fmt(n)+' Fr.';
const pAmt=s=>{const v=parseFloat(String(s).replace(/'/g,'').replace(/,/g,'.'));return isNaN(v)?0:Math.round(v*100)/100;};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
const mkGroups=()=>GROUP_NAMES.map(n=>({name:n,items:[]}));
const emptyYear=()=>({calc:{current:{start:0,income:[],groups:mkGroups()},next:{start:0,income:[],groups:mkGroups()}},
  accounts:[],fixkosten:{items:[],transfer:0,base:0,monate:MONTHS.map(m=>({monat:m,ein:0,abgaenge:[]}))},
  ccCalc:{current:[],next:[],cashbackRate:0.003},ccOwn:[],ccShared:[],investments:[]});
function Y(){ if(!years[year]) years[year]=emptyYear(); return years[year]; }
function normalizeYear(d){
  if(!d) return d;
  ['current','next'].forEach(s=>{
    const c=d.calc?.[s]; if(!c) return;
    if(Array.isArray(c.groups) && c.groups.length && Array.isArray(c.groups[0]))
      c.groups=c.groups.map((g,i)=>({name:GROUP_NAMES[i]||'Weitere',items:g}));
    if(!Array.isArray(c.groups)||!c.groups.length) c.groups=mkGroups();
    c.groups.forEach(g=>{g.items=g.items||[];});
  });
  (d.fixkosten?.monate||[]).forEach(m=>{
    if(m.abgaenge){m.abg=(m.abgaenge||[]).reduce((a,x)=>a+x,0);delete m.abgaenge;}});
  return d;
}

/* ---------- Persistenz ---------- */
const col=()=>db.collection('users').doc(uid).collection('finance');
let saveTimer=null;
async function flushSave(){
  for(const id of Object.keys(dirty)){
    const data=id==='settings'?settings:years[id];
    if(!data) continue;
    try{ await col().doc(id).set(JSON.parse(JSON.stringify(data))); delete dirty[id]; }
    catch(e){ console.error('Speichern fehlgeschlagen',id,e);
      toast('Speichern fehlgeschlagen: '+(e.message||e.code)); return false; }
  }
  $('saveDot').classList.remove('on'); return true;
}
function save(docId){
  dirty[docId]=true; $('saveDot').classList.add('on');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(flushSave,900);
}
async function loadAll(){
  const s=await col().get();
  years={};
  s.docs.forEach(d=>{ if(d.id==='settings') settings={...settings,...d.data()};
    else years[d.id]=normalizeYear(d.data()); });
  const ys=Object.keys(years).sort();
  if(ys.length && !years[year]) year=ys[ys.length-1];
  renderYear();
}

/* ---------- Auth ---------- */
if(configured){
  firebase.initializeApp(FIREBASE_CONFIG);
  auth=firebase.auth(); db=firebase.firestore();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  auth.onAuthStateChanged(async u=>{
    if(u){ uid=u.uid; $('authView').classList.add('hidden');
      $('appView').classList.remove('hidden'); await loadAll(); }
    else { uid=null; $('appView').classList.add('hidden');
      $('authView').classList.remove('hidden'); }
  });
}else{
  $('authView').classList.remove('hidden');

/* ---------- Editier-Helfer (data-path Binding) ---------- */
function getPath(root,path){return path.split('.').reduce((o,k)=>o?.[k],root);}
function setPath(root,path,val){const ks=path.split('.');const last=ks.pop();
  const o=ks.reduce((o,k)=>o[k],root); o[last]=val;}
function inp(path,val,opts={}){
  if(opts.lab) return '<div class="labEdit" contenteditable="plaintext-only" '+
    'data-path="'+path+'" data-kind="text">'+esc(val)+'</div>';
  return '<input data-path="'+path+'" data-kind="'+(opts.kind||'num')+'" value="'+(val??'')+'">';
}
document.addEventListener('focusout',e=>{
  const el=e.target;
  if(!el.classList||!el.classList.contains('labEdit')||!el.dataset.path) return;
  const scope=el.dataset.scope||'year';
  setPath(scope==='settings'?settings:Y(),el.dataset.path,el.textContent.trim());
  save(scope==='settings'?'settings':year);
  renderTab();
});
document.addEventListener('change',e=>{
  const el=e.target; if(!el.dataset||!el.dataset.path||el.classList.contains('labEdit')) return;
  const kind=el.dataset.kind;
  const val=kind==='num'?pAmt(el.value):el.value;
  const scope=el.dataset.scope||'year';
  setPath(scope==='settings'?settings:Y(),el.dataset.path,val);
  save(scope==='settings'?'settings':year);
  renderTab();
});
document.addEventListener('click',e=>{
  const a=e.target.closest('[data-act]'); if(!a) return;
  handleAction(a.dataset); 
});
/* ================= ÜBERSICHT ================= */
function bar(pct,warnAt){
  const cls=pct>=100?'':(warnAt&&pct>=warnAt?'warn':'');
  return '<div class="bar '+cls+'"><i style="width:'+Math.min(100,Math.max(0,pct))+'%"></i></div>';
}

  const yy=Y();

    '<div class="dashCell"><div class="cap">Nettowert ('+MONTHS[nowMi].slice(0,3)+')</div>'+
      '<div class="val num">'+fmt(nw)+'</div></div>'+
    '<div class="dashCell"><div class="cap">Zuwachs im Jahr</div>'+
      '<div class="val num '+(nw-nwStart<0?'neg':'pos')+'">'+fmt(nw-nwStart)+'</div></div>'+
    '</div>';
  h+='<div class="card" style="margin-top:12px"><h3>Sparquote '+year+'</h3>'+
    '<div class="statLine"><span>Gespart (alle Konten, ＋ − −)</span><b class="num pos">'+fmt(gespart)+'</b></div>'+
    '<div class="statLine"><span>Jahreslohn (editierbar)</span><b>'+inp('lohnJahr',lohnJahr)+'</b></div>'+
    '<div class="statLine"><span>Sparquote</span><b class="num"><span class="dblRule">'+sparquote.toFixed(1)+' %</span></b></div>'+
    bar(sparquote*2.5)+'<p class="hint" style="margin-top:5px">Balken voll bei 40 % Sparquote</p></div>';

    '<div class="statLine"><span>Nettowert vs. benötigtes Vermögen</span>'+
    '<b class="num">'+fmt(nw)+' / '+fmt(noetig)+'</b></div>'+bar(nw/(noetig||1)*100)+
    '<div class="statLine" style="border:none"><span>Fortschritt</span><b class="num">'+

    '<div style="font-size:.88rem;line-height:1.6;margin-top:10px">'+

/* ================= MONAT ================= */
function calcSide(s){
  const inc=(s.income||[]).reduce((a,i)=>a+(i.value||0),0);
  const total=(s.start||0)+inc;
  const aus=(s.groups||[]).reduce((a,g)=>a+(g.items||[]).reduce((x,i)=>x+(i.value||0),0),0);
  const rest=total-aus;
  return {inc,total,aus,rest,zuwachs:rest-(s.start||0),
    moegl:rest-(settings.lohnkontoZiel||4000)};
}
function sideCard(side,title){

  const now=side==='current';
  let h='<div class="card '+(now?'cardNow':'cardNext')+'"><div class="cardHeadRow"><h3>'+title+

    '<button class="miniBtn" data-act="monthRoll">Monatswechsel</button></span>';

  h+='<tr><td>Startkapital Zahlungskonto</td><td>'+inp('calc.'+side+'.start',s.start)+'</td><td></td></tr>';

       '<td>'+inp('calc.'+side+'.income.'+ix+'.value',i.value)+'</td>'+
       '<td><button class="rowDel" data-act="del" data-p="calc.'+side+'.income" data-i="'+ix+'">✕</button></td></tr>';

  h+='<tr><td colspan="3"><button class="miniBtn ghost" data-act="add" data-p="calc.'+side+'.income">＋ Lohn/Gutschrift</button></td></tr>';
  h+='<tr class="sumRow"><td>Total Kapital vorhanden</td><td class="num">'+fmt(c.total)+'</td><td></td></tr>';
  (s.groups||[]).forEach((g,gi)=>{
    h+='<tr><td colspan="3" class="grpCap">'+inp('calc.'+side+'.groups.'+gi+'.name',g.name,{lab:1,kind:'text'})+'</td></tr>';
    (g.items||[]).forEach((i,ix)=>{
      h+='<tr><td class="labCol">'+inp('calc.'+side+'.groups.'+gi+'.items.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+

  h+='</tbody></table>';
  h+='<div class="kb"><div><div class="cap">Restguthaben</div><div class="val num"><span class="dblRule '+(c.rest<0?'neg':'')+'">'+fmt(c.rest)+'</span></div></div>'+
     '<div><div class="cap">Zuwachs Kapital</div><div class="val num '+(c.zuwachs<0?'neg':'pos')+'">'+fmt(c.zuwachs)+'</div></div>'+

/* ================= KONTEN ================= */
function accountSaldi(a){
  let run=a.start||0; const saldi=[];
  (a.months||[]).forEach(m=>{run=Math.round((run+(m.plus||0)-(m.minus||0)+(m.adjust||0))*100)/100;saldi.push(run);});
  return saldi;
}
function renderKonten(){
  if(!years[year]){renderMonat();return;}
  const accs=Y().accounts||[];

    '<div><div class="cap">Zuwachs im Jahr</div><div class="val num pos">'+fmt((nw[11]||0)-accs.reduce((a,ac)=>a+(ac.start||0),0))+'</div></div>'+
    '<div><div class="cap">Konten</div><div class="val num">'+accs.length+'</div></div></div>'+

    const hasProg=(a.months||[]).some(m=>m.prognose!=null);
    h+='<div class="card"><div class="cardHeadRow"><h3><div class="labEdit" contenteditable="plaintext-only" data-path="accounts.'+ai+'.name" data-kind="text" style="font-family:\'Newsreader\',serif;font-size:1.08rem">'+esc(a.name)+'</div></h3>'+
      '<button class="miniBtn danger" data-act="delAcc" data-i="'+ai+'">Löschen</button></div>'+
      '<div class="scrollX"><table class="ledger"><thead><tr><th>Monat</th>'+(hasProg?'<th>Prognose</th>':'')+
      '<th>＋</th><th>−</th><th>Saldo</th></tr></thead><tbody>';
    h+='<tr><td>Start</td>'+(hasProg?'<td></td>':'')+'<td></td><td></td><td>'+inp('accounts.'+ai+'.start',a.start)+'</td></tr>';
    MONTHS.forEach((M,mi)=>{
      const m=a.months[mi]||{};

        '<td class="num">'+fmt(saldi[mi])+(m.adjust?' <span class="pill" title="Korrektur/Kurseffekt">Δ '+fmt(m.adjust)+'</span>':'')+'</td></tr>';
    });
    h+='<tr class="sumRow"><td>＋ Ende Jahr</td>'+(hasProg?'<td></td>':'')+
      '<td class="num pos">'+fmt(plusSum)+'</td><td class="num neg">'+fmt(minusSum)+'</td>'+

/* ================= KREDITKARTEN ================= */
const ccTot=e=>e.amount!=null?e.amount:(e.amounts||[]).reduce((a,x)=>a+x,0);
function renderKK(){
  if(!years[year]){renderMonat();return;}
  const yy=Y();
  const cc=yy.ccCalc||{current:[],next:[],cashbackRate:0.003};
  let h='';
  // Kalkulation nächster Monat
  [['current','Kalkulation aktueller Monat'],['next','Kalkulation nächster Monat']].forEach(([side,title])=>{
    const tot=(cc[side]||[]).reduce((a,i)=>a+(i.value||0),0);
    const now=side==='current';
    h+='<div class="card '+(now?'cardNow':'cardNext')+'"><div class="cardHeadRow"><h3>'+title+
      '<span class="tag '+(now?'tagNow':'tagNext')+'">'+(now?'Aktuell':'Folgemonat')+'</span></h3>'+
      '<button class="miniBtn ghost" data-act="add" data-p="ccCalc.'+side+'">＋ Posten</button></div>'+
      '<table class="ledger"><tbody>';
    (cc[side]||[]).forEach((i,ix)=>{
      h+='<tr><td class="labCol">'+inp('ccCalc.'+side+'.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
        '<td>'+inp('ccCalc.'+side+'.'+ix+'.value',i.value)+'</td>'+
        '<td><button class="rowDel" data-act="del" data-p="ccCalc.'+side+'" data-i="'+ix+'">✕</button></td></tr>';});
    h+='<tr class="sumRow"><td>Total</td><td class="num"><span class="dblRule">'+fmt(tot)+'</span></td><td></td></tr></tbody></table>'+
      '<div class="statLine"><span>Cashback ('+((cc.cashbackRate||0.003)*100).toFixed(1)+'%)</span><b class="num pos">'+fmt(tot*(cc.cashbackRate||0.003))+'</b></div></div>';
  });
  // Monatswerte + Durchschnitt
  [['ccOwn','Eigene Karte – Monatswerte',false],['ccShared','Gemeinsame Karte – Monatswerte',true]].forEach(([key,title,shared])=>{
    const rows=yy[key]||[];
    while(rows.length<12) rows.push({amounts:[]});
    const totals=rows.map(ccTot);
    const ferien=rows.map(r=>r.ferien||0);
    const n=totals.filter((t,i)=>t>0||ferien[i]>0).length||1;
    const avg=totals.reduce((a,x)=>a+x,0)/n;
    const avgNormal=(totals.reduce((a,x)=>a+x,0)-ferien.reduce((a,x)=>a+x,0))/n;
    h+='<div class="card"><h3>'+title+'</h3><table class="ledger"><thead><tr><th>Monat</th><th>Total</th>'+
      (shared?'<th>davon Ferien/Einmalig</th>':'')+'</tr></thead><tbody>';
    MONTHS.forEach((M,mi)=>{
      h+='<tr><td>'+M.slice(0,3)+'</td><td>'+inp(key+'.'+mi+'.amount',totals[mi]||'')+'</td>'+
        (shared?'<td>'+inp(key+'.'+mi+'.ferien',ferien[mi]||'')+'</td>':'')+'</tr>';});
    h+='</tbody></table>'+
      '<div class="statLine"><span>Ø pro Monat ('+n+' Monate)</span><b class="num">'+fmt(avg)+'</b></div>'+
      (shared?'<div class="statLine"><span>Ø „Normal" (ohne Ferien)</span><b class="num">'+fmt(avgNormal)+'</b></div>'+
        '<div class="statLine"><span>Eigener Anteil (½)</span><b class="num"><span class="dblRule">'+fmt(avgNormal/2)+'</span></b></div>':'')+
      '</div>';
  });
  h+='<p class="hint" style="margin:0 6px 16px">Die Ø-Werte kannst du als Prognose für „Kreditkarte" im Folgemonat verwenden.</p>';
  $('tabKK').innerHTML=h;
}

/* ================= NETTOLOHN ================= */
const r05=x=>Math.round(x*20)/20;   // Schweizer Rappenrundung auf 5 Rp.
const defaultNetto=()=>({brutto12:0,brutto13:0,items:[
  {label:'AHV-Beitrag',rate:0.053},{label:'ALV-Beitrag',rate:0.011},
  {label:'UVG-Beitrag NBU',rate:0.0089},{label:'PK-BVG-Beitrag',fix:0},
  {label:'KTG-Beitrag',rate:0.01433}],
  bvg:{hoechstlohn:90720,koordinationsabzug:26460,jahreslohn:0,sparsatz:0.07,zusatzsatz:0.0222658}});
function nettoCalc(n){
  const rows=(n.items||[]).map(it=>({
    a12:it.rate?r05((n.brutto12||0)*it.rate):(it.fix||0),
    a13:it.rate?r05((n.brutto13||0)*it.rate):0}));
  const s12=rows.reduce((a,x)=>a+x.a12,0), s13=rows.reduce((a,x)=>a+x.a13,0);
  const n12=(n.brutto12||0)-s12, n13=(n.brutto13||0)-s13;
  return {rows,n12,n13,jahr:Math.round((12*n12+n13)*100)/100};
}
function bvgCalc(b){
  const vers=Math.max(0,Math.min(b.jahreslohn||0,b.hoechstlohn||0)-(b.koordinationsabzug||0));
  const spar=vers*(b.sparsatz||0), zusatz=vers*(b.zusatzsatz||0);
  const anJahr=(spar+zusatz)/2;
  return {vers,spar,zusatz,anJahr,anMonat:r05(anJahr/12)};
}
function nettoSection(){
  const yy=Y();
  if(!yy.netto) yy.netto=defaultNetto();
  const n=yy.netto, c=nettoCalc(n), b=n.bvg||defaultNetto().bvg, bc=bvgCalc(b);
  let h='<p class="sectionCap">Nettolohnberechnung '+year+'</p><div class="card">'+
    '<div class="scrollX"><table class="ledger"><thead><tr><th>Position</th><th>Satz</th>'+
    '<th>12 Monatslöhne</th><th>13.</th><th></th></tr></thead><tbody>';
  h+='<tr><td class="labCol"><b>Bruttolohn</b></td><td></td>'+
    '<td>'+inp('netto.brutto12',n.brutto12)+'</td><td>'+inp('netto.brutto13',n.brutto13)+'</td><td></td></tr>';
  (n.items||[]).forEach((it,ix)=>{
    h+='<tr><td class="labCol">'+inp('netto.items.'+ix+'.label',it.label,{lab:1,kind:'text'})+'</td>'+
      '<td>'+(it.rate!=null&&!it.fix?inp('netto.items.'+ix+'.rate',it.rate):
        inp('netto.items.'+ix+'.fix',it.fix||0))+'</td>'+
      '<td class="num neg">−'+fmt(c.rows[ix].a12)+'</td>'+
      '<td class="num neg">'+(c.rows[ix].a13?'−'+fmt(c.rows[ix].a13):'–')+'</td>'+
      '<td><button class="rowDel" data-act="del" data-p="netto.items" data-i="'+ix+'">✕</button></td></tr>';});
  h+='<tr class="sumRow"><td>Nettolohn</td><td></td>'+
    '<td class="num"><span class="dblRule">'+fmt(c.n12)+'</span></td>'+
    '<td class="num"><span class="dblRule">'+fmt(c.n13)+'</span></td><td></td></tr>';
  h+='</tbody></table></div>'+
    '<button class="miniBtn ghost" data-act="addAbzug" style="margin:8px 0 4px">＋ Abzug</button>'+
    '<div class="statLine"><span>Netto-Jahreslohn (12 × Netto + 13.)</span>'+
    '<b class="num"><span class="dblRule">'+fmt(c.jahr)+'</span></b></div>'+
    '<div class="statLine"><span>Für Sparquote in der Übersicht verwenden</span>'+
    '<button class="miniBtn" data-act="lohnApply">Übernehmen</button></div>'+
    '<div class="statLine"><span>Netto (12 ML) als «neuer Lohn» in die Monatskalkulation</span>'+
    '<button class="miniBtn ghost" data-act="nettoZuLohn">Übernehmen</button></div>'+
    '<p class="hint" style="margin-top:6px">Prozent-Abzüge als Dezimalsatz (z. B. 0.053 = 5.3 %), '+
    'gerundet auf 5 Rappen. Fixbeträge (PK-BVG) gelten nur für die 12 Monatslöhne.</p></div>';
  h+='<div class="card"><h3>BVG-Pensionskasse</h3>'+
    '<div class="statLine"><span>Höchstlohn</span><b>'+inp('netto.bvg.hoechstlohn',b.hoechstlohn)+'</b></div>'+
    '<div class="statLine"><span>Koordinationsabzug</span><b>'+inp('netto.bvg.koordinationsabzug',b.koordinationsabzug)+'</b></div>'+
    '<div class="statLine"><span>Jahreslohn (brutto)</span><b>'+inp('netto.bvg.jahreslohn',b.jahreslohn)+'</b></div>'+
    '<div class="statLine"><span>Versicherter Lohn</span><b class="num">'+fmt(bc.vers)+'</b></div>'+
    '<div class="statLine"><span>Sparbeitragssatz</span><b>'+inp('netto.bvg.sparsatz',b.sparsatz)+'</b></div>'+
    '<div class="statLine"><span>Zusatzkosten-Satz</span><b>'+inp('netto.bvg.zusatzsatz',b.zusatzsatz)+'</b></div>'+
    '<div class="statLine"><span>Sparbeitrag / Jahr</span><b class="num">'+fmt(bc.spar)+'</b></div>'+
    '<div class="statLine"><span>Zusatzkosten / Jahr</span><b class="num">'+fmt(bc.zusatz)+'</b></div>'+
    '<div class="statLine"><span>Arbeitnehmerabzug / Jahr (½)</span><b class="num">'+fmt(bc.anJahr)+'</b></div>'+
    '<div class="statLine"><span>Arbeitnehmerabzug / Monat</span>'+
    '<b class="num"><span class="dblRule">'+fmt(bc.anMonat)+'</span></b></div>'+
    '<div class="statLine"><span>Als PK-BVG-Abzug oben eintragen</span>'+
    '<button class="miniBtn" data-act="bvgApply">Übernehmen</button></div></div>';
  return h;
}

function renderLohn(){
  if(!years[year]){renderMonat();$('tabLohn').innerHTML=$('tabMonat').innerHTML;return;}
  $('tabLohn').innerHTML=nettoSection();
}

/* ================= MEHR ================= */
function renderMehr(){
  const yy=years[year]||emptyYear();
  const fire=settings.fire||{items:[],entnahmerate:0.026};
  const fSum=(fire.items||[]).reduce((a,i)=>a+(i.value||0),0);
  const noetig=fire.entnahmerate?fSum/fire.entnahmerate:0;
  let h='<p class="sectionCap">Investitionen '+year+'</p><div class="card">'+
    '<table class="ledger"><tbody>';
  (yy.investments||[]).forEach((i,ix)=>{
    h+='<tr><td class="dateCol">'+inp('investments.'+ix+'.date',i.date,{lab:1,kind:'text'})+'</td>'+
      '<td class="labCol">'+inp('investments.'+ix+'.label',i.label,{lab:1,kind:'text'})+'</td>'+
      '<td>'+inp('investments.'+ix+'.amount',i.amount)+'</td>'+
      '<td><button class="rowDel" data-act="del" data-p="investments" data-i="'+ix+'">✕</button></td></tr>';});
  h+='<tr class="sumRow"><td colspan="2">Total</td><td class="num">'+
    fmt((yy.investments||[]).reduce((a,i)=>a+(i.amount||0),0))+'</td><td></td></tr></tbody></table>'+
    '<button class="miniBtn ghost" data-act="addInv" style="margin-top:8px">＋ Investition</button></div>';
  h+='<p class="sectionCap">FIRE-Berechnung</p><div class="card"><table class="ledger"><tbody>';
  (fire.items||[]).forEach((i,ix)=>{
    h+='<tr><td class="labCol"><div class="labEdit" contenteditable="plaintext-only" data-scope="settings" data-path="fire.items.'+ix+'.label">'+esc(i.label)+'</div></td>'+
      '<td><input data-scope="settings" data-path="fire.items.'+ix+'.value" data-kind="num" value="'+i.value+'"></td>'+
      '<td><button class="rowDel" data-act="delFire" data-i="'+ix+'">✕</button></td></tr>';});
  h+='<tr class="sumRow"><td>Kosten pro Jahr</td><td class="num">'+fmt(fSum)+'</td><td></td></tr></tbody></table>'+
    '<button class="miniBtn ghost" data-act="addFire" style="margin:8px 0 4px">＋ Position</button>'+
    '<div class="statLine"><span>Kosten pro Monat</span><b class="num">'+fmt(fSum/12)+'</b></div>'+
    '<div class="statLine"><span>Entnahmerate</span><b><input data-scope="settings" data-path="fire.entnahmerate" data-kind="num" value="'+(fire.entnahmerate||0.026)+'" style="width:70px;text-align:right;border:1px solid var(--rule-strong);border-radius:6px;padding:3px 6px"></b></div>'+
    '<div class="statLine"><span>Benötigtes Vermögen</span><b class="num"><span class="dblRule">'+fmt(noetig)+'</span></b></div>'+
    '<div class="statLine"><span>Ziel-Vermögen</span><b><input data-scope="settings" data-path="fire.vermoegen" data-kind="num" value="'+(fire.vermoegen||0)+'" style="width:110px;text-align:right;border:1px solid var(--rule-strong);border-radius:6px;padding:3px 6px"></b></div></div>';
  h+='<p class="sectionCap">Meine Finanzregeln</p><div class="card">';
  (settings.rules||[]).forEach((r,ix)=>{
    h+='<div class="statLine"><span style="flex:1"><b>'+esc(r.nr||(ix+1)+'.')+'</b> '+
      '<div class="labEdit" contenteditable="plaintext-only" data-scope="settings" data-path="rules.'+ix+'.text">'+esc(r.text)+'</div></span>'+
      (r.value?'<b class="num" style="margin-left:8px">'+fmt(r.value)+'</b>':'')+
      '<button class="rowDel" data-act="delRule" data-i="'+ix+'">✕</button></div>';});
  h+='<button class="miniBtn ghost" data-act="addRule" style="margin-top:8px">＋ Regel</button></div>';
  h+='<p class="sectionCap">Jahresvergleich</p><div class="card"><div class="chartBox"><canvas id="cVergleich"></canvas></div></div>';
  h+='<p class="sectionCap">Daten</p><div class="card">'+
    '<div class="statLine"><span>Excel-Daten importieren<br><span class="hint">seed.json vom Gerät auswählen – nicht ins Repo hochladen!</span></span><button class="miniBtn" data-act="importSeed">Importieren</button></div>'+
    '<input type="file" id="seedFile" accept=".json,application/json" class="hidden">'+
    '<div class="statLine"><span>Backup als JSON herunterladen</span><button class="miniBtn ghost" data-act="exportJson">Export</button></div>'+
    '<div class="statLine"><span id="mailLine"></span><button class="miniBtn ghost" data-act="logout">Abmelden</button></div></div>';
  $('tabMehr').innerHTML=h;
  if(auth?.currentUser) $('mailLine').textContent=auth.currentUser.email||'Google-Konto';
  const ys=Object.keys(years).sort();
  const ends=ys.map(y=>{const a=(years[y].accounts||[]);
    return a.reduce((t,ac)=>{let r=ac.start||0;(ac.months||[]).forEach(m=>r+=(m.plus||0)-(m.minus||0)+(m.adjust||0));return t+r;},0);});
  if(chartVergleich)chartVergleich.destroy();
  chartVergleich=new Chart($('cVergleich'),{type:'bar',data:{labels:ys,
    datasets:[{label:'Nettowert Ende Jahr',data:ends,backgroundColor:'#5B5FEF',borderRadius:8}]},
    options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>Math.round(v/1000)+"k"}}}}});
}

/* ================= AKTIONEN ================= */
async function handleAction(d){
  const yy=Y();
  switch(d.act){
    case 'add': getPath(yy,d.p).push({label:'Neu',value:0}); break;
    case 'del': getPath(yy,d.p).splice(+d.i,1); break;
    case 'restNext': yy.calc.next.start=calcSide(yy.calc.current).rest;
      toast('Restguthaben als Startkapital des Folgemonats übernommen'); break;
    case 'monthRoll': {
      if(!confirm('Monatswechsel: Der Folgemonat wird zum aktuellen Monat. Fortfahren?')) return;
      const rest=calcSide(yy.calc.current).rest;
      yy.calc.current=JSON.parse(JSON.stringify(yy.calc.next));
      yy.calc.current.start=rest;
      toast('Folgemonat übernommen – Startkapital = bisheriges Restguthaben'); break; }
    case 'addAcc': yy.accounts.push({name:'Neues Konto',start:0,
      months:MONTHS.map(()=>({plus:0,minus:0})),extra:[]}); break;
    case 'delAcc': if(confirm('Konto wirklich löschen?')) yy.accounts.splice(+d.i,1); else return; break;
    case 'addAbzug': (yy.netto.items=yy.netto.items||[]).push({label:'Neu',rate:0}); break;
    case 'nettoZuLohn': {
      const netto=nettoCalc(yy.netto).n12;
      ['current','next'].forEach(side=>{
        const inc=yy.calc[side].income;
        const hit=inc.find(i=>/lohn/i.test(i.label||''));
        if(hit) hit.value=netto; else inc.unshift({label:'neuer Lohn',value:netto});
      });
      toast('Nettolohn '+fmt(netto)+' als «neuer Lohn» übernommen'); break; }
    case 'lohnApply': yy.lohnJahr=Math.round(nettoCalc(yy.netto).jahr);
      toast('Netto-Jahreslohn für die Sparquote übernommen'); break;
    case 'bvgApply': {
      const pk=(yy.netto.items||[]).find(i=>/pk|bvg/i.test(i.label));
      const v=bvgCalc(yy.netto.bvg).anMonat;
      if(pk){ pk.fix=v; delete pk.rate; }
      else yy.netto.items.push({label:'PK-BVG-Beitrag',fix:v});
      toast('PK-BVG-Abzug auf '+fmt(v)+' gesetzt'); break; }
    case 'addInv': (yy.investments=yy.investments||[]).push({date:new Date().toISOString().slice(0,10),label:'Neu',amount:0}); break;
    case 'addFire': settings.fire.items.push({label:'Neu',value:0}); save('settings'); renderTab(); return;
    case 'delFire': settings.fire.items.splice(+d.i,1); save('settings'); renderTab(); return;
    case 'addRule': (settings.rules=settings.rules||[]).push({nr:(settings.rules.length+1)+'.',text:''}); save('settings'); renderTab(); return;
    case 'delRule': settings.rules.splice(+d.i,1); save('settings'); renderTab(); return;
    case 'newYear': {
      const prev=years[String(+year-1)];
      const ny=prev?JSON.parse(JSON.stringify(prev)):emptyYear();
      if(prev){
        ny.accounts.forEach(a=>{a.start=accountSaldi(a)[11]??a.start;
          a.months=MONTHS.map(()=>({plus:0,minus:0}));});
        ny.fixkosten.base=0; ny.fixkosten.monate=MONTHS.map((m,i)=>({monat:m,ein:prev.fixkosten?.transfer||0,abg:0}));
        ny.investments=[]; ny.ccOwn=[]; ny.ccShared=[];
        ny.calc.current.start=calcSide(prev.calc.next).rest;
      }
      years[year]=ny; break; }
    case 'blankYear': years[year]=emptyYear(); break;
    case 'importSeed': document.getElementById('seedFile').click(); return;
    case 'exportJson': {
      const blob=new Blob([JSON.stringify({settings,years},null,1)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='lohnkalkulation-backup.json';a.click(); return; }
    case 'logout': auth.signOut(); return;
    default: return;
  }
  save(year); renderTab();
}
document.addEventListener('change',async e=>{
  if(e.target.id!=='seedFile'||!e.target.files[0]) return;
  try{
    const seed=JSON.parse(await e.target.files[0].text());
    settings={...settings,...seed.settings};
    for(const [yr,data] of Object.entries(seed.years||{})){
      years[yr]=normalizeYear({...(years[yr]||{}),...data}); dirty[yr]=true;
    }
    dirty['settings']=true;
    toast('Importiere und speichere …');
    const ok=await flushSave();
    if(ok) toast('Alle Jahre importiert und gespeichert ✓');
    renderTab();
  }catch(err){ toast('Import fehlgeschlagen: keine gültige seed.json'); }
  e.target.value='';
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
